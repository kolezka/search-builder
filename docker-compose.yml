services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: search-builder-pg:latest
    container_name: search-builder-pg
    restart: unless-stopped
    environment:
      # POSTGRES_USER=search_builder and POSTGRES_DB=search_builder are baked
      # into the custom image (docker/postgres.Dockerfile) so they don't
      # surface in Coolify's env tab as "deletable but required" constants.
      # Only the password ever needs to be configured by the operator.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your env}
    volumes:
      - app-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U search_builder -d search_builder']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: search-builder:latest
    container_name: search-builder
    restart: unless-stopped
    # No host-port mapping — Coolify's reverse proxy talks to the container
    # directly on the compose network. `expose` documents the contract and
    # mirrors EXPOSE 3000 3001 in the Dockerfile (web on 3000, api on 3001).
    expose:
      - '3000'
      - '3001'
    environment:
      # Only the values that operators actually configure. Postgres host /
      # user / db / port have schema defaults in apps/api/src/env.ts that
      # match this compose file. NODE_ENV / PORT are pinned in the
      # Dockerfile / env schema. Keeping this list short means Coolify's
      # env tab stays free of redundant constants.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your env}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:?Set INITIAL_PASSWORD in your env (seeds the bcrypt hash on first boot)}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?Set ALLOWED_ORIGIN in your env (e.g. https://search-builder.example.com)}
      WEB_ORIGIN: ${WEB_ORIGIN:?Set WEB_ORIGIN in your env (e.g. https://search-builder.example.com)}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app-pg:
