services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: search-builder-pg:latest
    container_name: search-builder-pg
    restart: unless-stopped
    environment:
      # POSTGRES_USER=search_builder and POSTGRES_DB=search_builder are baked
      # into the custom image (docker/postgres.Dockerfile) so they don't
      # surface in Coolify's env tab as "deletable but required" constants.
      # Only the password ever needs to be configured by the operator.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - app-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U search_builder -d search_builder']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    image: search-builder-api:latest
    container_name: search-builder-api
    restart: unless-stopped
    # No host-port mapping — Coolify's reverse proxy talks to the container
    # directly on the compose network. Declaring SERVICE_FQDN_API_3001 below
    # tells Coolify to assign a domain to port 3001 (operator can override
    # with a custom FQDN in the Coolify UI).
    expose:
      - '3001'
    environment:
      SERVICE_FQDN_API_3001:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD}
      # Cross-origin from the web FQDN — both share the same parent domain,
      # so SameSite=Lax cookies (set by hono/cookie) are accepted by the
      # browser on app→api fetches.
      ALLOWED_ORIGIN: ${SERVICE_FQDN_WEB_3000}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # Leave COOKIE_DOMAIN unset to scope the session cookie to the API
      # host. Set it to ".parent-domain.tld" only if you also want the
      # cookie readable from the web origin (not required for this app).
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    image: search-builder-web:latest
    container_name: search-builder-web
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      SERVICE_FQDN_WEB_3000:
      # Adapter-node reads ORIGIN to validate the Host header; must match
      # the public URL the browser uses.
      ORIGIN: ${SERVICE_FQDN_WEB_3000}
      # Browser-visible base URL for API calls. Empty in dev (Vite proxy
      # handles /api/*); set to the api FQDN in production.
      PUBLIC_API_BASE: ${SERVICE_FQDN_API_3001}
    depends_on:
      api:
        condition: service_healthy

volumes:
  app-pg:
