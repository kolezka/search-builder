services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: 'search-builder-pg:latest'
    container_name: search-builder-pg
    restart: unless-stopped
    environment:
      # POSTGRES_USER=search_builder and POSTGRES_DB=search_builder are
      # baked into the custom image (docker/postgres.Dockerfile) so the
      # operator only ever sets the password in Coolify's env tab.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - 'app-pg:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U search_builder -d search_builder'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 'search-builder:latest'
    container_name: search-builder
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      # Declaring SERVICE_FQDN_APP_3000 (with the port suffix) tells Coolify
      # to route the generated public FQDN to container port 3000. Coolify
      # then exposes SERVICE_URL_APP (full https URL, no port) which we
      # feed to adapter-node as ORIGIN.
      SERVICE_FQDN_APP_3000:
      ORIGIN: ${SERVICE_URL_APP}
      ALLOWED_ORIGIN: ${SERVICE_URL_APP}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app-pg:
