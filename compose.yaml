services:
  search-builder:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      PORT: 3001
      DB_PATH: /data/db.sqlite
      INITIAL_PASSWORD: ${INITIAL_PASSWORD}
      SESSION_TTL_DAYS: 30
      COOKIE_SECURE: 'true'
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      WEB_ORIGIN: ${WEB_ORIGIN}
    volumes:
      - search_builder_data:/data

volumes:
  search_builder_data:
