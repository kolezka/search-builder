name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: search_builder
          POSTGRES_PASSWORD: search_builder
          POSTGRES_DB: search_builder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U search_builder -d search_builder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://search_builder:search_builder@localhost:5432/search_builder_test
      DATABASE_URL: postgres://search_builder:search_builder@localhost:5432/search_builder
      INITIAL_PASSWORD: e2e
      COOKIE_SECURE: 'false'
      ALLOWED_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun --filter @search-builder/engines test
      - run: bun --filter @search-builder/api test
      - name: Apply migrations for e2e
        run: bun src/db/migrate.ts
        working-directory: apps/api
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - run: bun run test
        working-directory: apps/web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
